<script>

const params = new URLSearchParams(window.location.search);

const module = params.get("module");
const token = localStorage.getItem("magicbank_token");

if(!token){

document.body.innerHTML =
"<h2>Acceso no autorizado</h2><p>Debes ingresar desde el portal MagicBank.</p>";

throw new Error("No token");

}

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
token:token
})

})
.then(res=>res.json())
.then(data=>{

if(!data.valid){

"<h2>Token expirado</h2><p>Tu acceso ha terminado.</p>";

}
